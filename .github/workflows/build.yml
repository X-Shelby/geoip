name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=latest" >> $GITHUB_ENV
          echo "RELEASE_NAME=Latest Update ($(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M'))" >> $GITHUB_ENV
        shell: bash

      - name: Download GeoLite2 databases
        env:
          LICENSE_KEY: ${{ secrets.MAXMIND_GEOLITE2_LICENSE }}
        run: |
          mkdir -p output
          curl -L "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-ASN-CSV&license_key=${LICENSE_KEY}&suffix=zip" -o ./output/GeoLite2-ASN-CSV.zip
          curl -L "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country-CSV&license_key=${LICENSE_KEY}&suffix=zip" -o ./output/GeoLite2-Country-CSV.zip

      - name: Prepare GeoLite2 databases
        run: |
          unzip ./output/GeoLite2-Country-CSV.zip -d ./
          unzip ./output/GeoLite2-ASN-CSV.zip -d ./
          mkdir -p geolite2
          cp GeoLite2-Country-CSV_*/*.csv ./geolite2/
          cp GeoLite2-ASN-CSV_*/*.csv ./geolite2/

      - name: Build geoip files
        run: |
          go build ./
          ./geoip convert -c ./config.json

      - name: Extract targets and clean output
        run: |
          cd output || exit 1
          # 1. 从各自的子目录提取成品文件到根目录
          cp text_v4/cn.txt ./cn_v4.txt 2>/dev/null || true
          cp text_v6/cn.txt ./cn_v6.txt 2>/dev/null || true
          cp text_all/cn.txt ./cn.txt 2>/dev/null || true
          cp srs/cn.srs ./cn.srs 2>/dev/null || true
          cp mrs/cn.mrs ./cn.mrs 2>/dev/null || true
          
          # 2. 彻底清理不需要的中间文件夹和临时文件
          # 这样 release 分支里就只有干净的 5 个文件
          find . -maxdepth 1 -type d ! -path . -exec rm -rf {} +
          # 排除我们要保留的文件，其余删除
          find . -maxdepth 1 -type f ! -name 'cn*' -delete

      - name: Push to release branch (Fixed Link)
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add cn_v4.txt cn_v6.txt cn.txt cn.srs cn.mrs
          git commit -m "Auto-update: ${{ env.RELEASE_NAME }}"
          git push -f "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" release

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd output || exit 1
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
          gh release delete latest --yes 2>/dev/null || true
          
          git tag latest
          git push origin latest
          
          # 发布 Release 并包含所有新格式文件
          gh release create latest \
            --title "${{ env.RELEASE_NAME }}" \
            --notes "固定下载链接：
              - IPv4 (TXT): https://github.com/${{ github.repository }}/releases/download/latest/cn_v4.txt
              - IPv6 (TXT): https://github.com/${{ github.repository }}/releases/download/latest/cn_v6.txt
              - 合并 (TXT): https://github.com/${{ github.repository }}/releases/download/latest/cn.txt
              - sing-box (SRS): https://github.com/${{ github.repository }}/releases/download/latest/cn.srs
              - Mihomo (MRS): https://github.com/${{ github.repository }}/releases/download/latest/cn.mrs" \
            ./cn_v4.txt ./cn_v6.txt ./cn.txt ./cn.srs ./cn.mrs

      - name: Purge jsdelivr CDN
        run: |
          # 刷新所有新文件的 CDN 缓存
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/cn_v4.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/cn_v6.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/cn.txt"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/cn.srs"
          curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/cn.mrs"
